name: CI/CD pipeline to deploy AWS resources
run-name: ${{ github.workflow }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test-workflow:
    runs-on: ubuntu-latest
    container: hashicorp/terraform:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE }}
          role-duration-seconds: 900
          role-skip-session-tagging: true
          aws-region: ap-southeast-2
      
      - name: Test step
        run: aws cloudfront list-distributions
