name: CI/CD pipeline to deploy AWS resources
run-name: ${{ github.workflow }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  plan-deploy-infrastructure:
    runs-on: ubuntu-latest
    container: hashicorp/terraform:1.14
    env:
      APP_NAME: single-page-app
      TF_VAR_subnet_id_a: ${{ secrets.SUBNET_A }}
      TF_VAR_subnet_id_b: ${{ secrets.SUBNET_B }}
      TF_VAR_subnet_id_c: ${{ secrets.SUBNET_C }}
      TF_VAR_iam_principal: ${{ secrets.EKS_IAM_PRINCIPAL }}
      TF_VAR_deploy_principal: ${{ secrets.EKS_DEPLOY_PRINCIPAL}}
      TF_VAR_topic_name: ${{ secrets.TOPIC_NAME }}
      TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE }}
          role-duration-seconds: 900
          role-skip-session-tagging: true
          aws-region: ap-southeast-2
      
      - name: Terraform format check
        run: |
          terraform fmt -recursive -diff

      - name: Terraform init
        run: |
          terraform init \
            -backend-config bucket=${{ secrets.TF_BUCKET }} \
            -backend-config key=terraform.tfstate

      - name: Terraform validate
        run: |
          terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var-file config/${{ env.APP_NAME }}.tfvars \
            -out=tfplan

      - name: Terraform apply
        if: ${{ github.ref_name == 'main' }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file config/${{ env.APP_NAME }}.tfvars \
            tfplan

  upload-html:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    needs: plan-deploy-infrastructure
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ASSUME_ROLE }}
          role-duration-seconds: 900
          role-skip-session-tagging: true
          aws-region: ap-southeast-2

      - name: Upload html
        run: |
          aws s3 sync html/ s3://single-page-app-html/ --delete
